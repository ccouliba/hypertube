server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Accessible only when Flask sets this header — never directly from the network.
    # nginx uses sendfile(2): zero-copy kernel transfer, Range/seek handled natively.
    location /internal-downloads/ {
        internal;
        alias /downloads/;
        add_header Accept-Ranges bytes always;
    }

    # Flask validates the stream_token cookie and returns X-Accel-Redirect.
    # nginx intercepts the header in the same process and serves the file directly.
    # Non-native formats (mkv/avi) fall back to Flask FFmpeg streaming.
    # Must be declared before /api/ so the regex location wins.
    location ~ ^/api/video/\d+/stream {
        proxy_pass              http://backend:5000;
        proxy_set_header        Host              $host;
        proxy_set_header        Cookie            $http_cookie;
        proxy_set_header        X-Real-IP         $remote_addr;
        proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;

        # Never buffer — stream bytes to the client as they arrive from Flask/disk.
        proxy_buffering         off;
        proxy_request_buffering off;

        # A full-length film can take several hours to watch.
        proxy_read_timeout      3600s;
        proxy_send_timeout      3600s;
    }

    location /api/ {
        proxy_pass       http://backend:5000;
        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
