services:

  nginx:
    container_name: nginx
    build:
      context: .
      dockerfile: nginx/Dockerfile
    ports:
      - "3000:80"
    volumes:
      - downloads_data:/downloads:ro
    networks:
      - app-network
    depends_on:
      app:
        condition: service_started
    restart: unless-stopped
    tty: true
    
  qbittorrent:
    image: linuxserver/qbittorrent:latest
    container_name: qbittorrent
    env_file:
      - .env
    ports:
      - "8080:8080"
      - "6881:6881"
    volumes:
      - ./qbittorrent/config/qBittorrent/qBittorrent.conf:/config/qBittorrent/qBittorrent.conf:ro
      - qbittorrent_cache:/config
      - downloads_data:/downloads
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:8080 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    tty: true

  app:
    container_name: backend
    build:
      context: ./app
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - "5000:5000"
    dns:
      - ${DNS_PRIMARY}
      - ${DNS_SECONDARY}
    volumes:
      - ./app/:/app/
      - downloads_data:/downloads
    networks:
      - app-network
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
      qbittorrent:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    tty: true

  database:
    container_name: database
    build:
      context: ./db
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${DB_USER:-hypertube}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-hypertube_db}
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-hypertube} -d ${DB_NAME:-hypertube_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    tty: true

  redis:
    container_name: redis
    build:
      context: ./redis
      dockerfile: Dockerfile
    ports:
      - "6379:6379"
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped
    tty: true

  celery-worker:
    container_name: celery-worker
    build:
      context: .
      dockerfile: celery/Dockerfile
    command: celery -A app.tasks.celery_app:celery_app worker --beat --loglevel=info --schedule /tmp/celerybeat-schedule
    env_file:
      - .env
    dns:
      - ${DNS_PRIMARY}
      - ${DNS_SECONDARY}
    volumes:
      - ./app:/app
      - downloads_data:/downloads
    networks:
      - app-network
    depends_on:
      redis:
        condition: service_healthy
      qbittorrent:
        condition: service_healthy
      database:
        condition: service_healthy
    restart: always
    tty: true

volumes:
  postgres_data:
  downloads_data:
  qbittorrent_cache:
  
networks:
  app-network:
    driver: bridge
 