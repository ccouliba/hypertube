[pytest]
# Pytest configuration for Hypertube project

# Minimum Python version
minversion = 7.0

# Python path - add project root so imports work
pythonpath = .

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts = 
    # Verbose output
    -v
    # Show local variables in tracebacks
    -l
    # Show summary of test results
    -ra
    # Stop on first failure (optional, uncomment to enable)
    # -x
    # Show captured output
    -s
    # Coverage options
    --cov=app
    --cov-report=term-missing
    --cov-report=html:htmlcov
    --cov-report=xml
    --cov-branch
    # Minimum coverage threshold
    --cov-fail-under=95

# Test paths
testpaths = tests

# Markers for organizing tests
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    unit: marks tests as unit tests
    auth: marks tests related to authentication
    search: marks tests related to search
    video: marks tests related to videos
    torrent: marks tests related to torrents
    api: marks tests related to API routes

# Logging
log_cli = false
log_cli_level = INFO
log_file = tests.log
log_file_level = DEBUG

# Ignore warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
